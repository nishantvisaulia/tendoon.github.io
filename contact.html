<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tendoon - Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body { 
      margin:0; 
      font-family:'Poppins',sans-serif; 
      background:#000; 
      color:white; 
    }

    h1 { font-size:50px; margin:0; } 
    p { color:#aaa; }

    /* HEADER */
    header { 
      background:#000; 
      padding:15px 20px; 
      display:flex; 
      justify-content:space-between; 
      align-items:center; 
    }

    nav a { 
      color:white; 
      margin:0 10px; 
      text-decoration:none;
      transition:0.3s;
    }

    nav a:hover {
      color:#00C2FF;
    }

    section { 
      padding:60px 20px; 
      text-align:center; 
    }

    form { 
      max-width:400px; 
      margin:auto; 
      display:flex; 
      flex-direction:column; 
      gap:12px;
    }

    input, textarea { 
      padding:12px; 
      border:none; 
      border-radius:6px; 
      background:#111; 
      color:white;
      outline:none;
    }

    button { 
      padding:14px; 
      background:linear-gradient(45deg,#7B2FFF,#00C2FF); 
      color:white; 
      border:none; 
      border-radius:6px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover { 
      transform:scale(1.05);
      box-shadow:0 0 15px #00C2FF;
    }

    footer { 
      background:#111; 
      color:#aaa; 
      text-align:center; 
      padding:25px; 
    }

    footer a { color:#00C2FF; }
  </style>
</head>

<body>

<!-- HEADER -->
<header>
  <a href="index.html">
    <img src="logo2.png" alt="Tendoon Logo" style="height:60px;">
  </a>
  <nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<!-- TITLE -->
<section>
  <h1>Contact Us</h1>
  <p>Let’s build something amazing together</p>
</section>

<!-- FORM -->
<section>
  <form>
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Your Email" required>
    <textarea placeholder="Your Message" rows="4" required></textarea>
    <button type="submit">Send Message</button>
  </form>

  <p style="margin-top:20px;">
    Or WhatsApp: 
    <a href="https://wa.me/919004230084" style="color:#00C2FF; text-decoration:none;">Click here</a>
  </p>
</section>

<!-- FOOTER -->
<footer>
  <p>&copy; 2026 Tendoon</p>
</footer>

</body>
</html>
