<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact - Tendoon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0;
      font-family:'Poppins',sans-serif;
      background:#000;
      color:white;
    }
    nav {
      display:flex;
      justify-content:center;
      gap:25px;
      padding:20px;
      background:#111;
      position:sticky;
      top:0;
      z-index:100;
    }
    nav a { text-decoration:none; color:white; font-weight:600; transition:0.3s; }
    nav a:hover { color:#7B2FFF; }

    h1 { font-size:40px; text-align:center; margin:40px 0 20px 0; }
    p { color:#aaa; max-width:600px; margin:0 auto 30px auto; line-height:1.6; text-align:center; }
    form {
      max-width:400px;
      margin:auto;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    input, textarea {
      padding:12px;
      border:none;
      border-radius:6px;
      background:#111;
      color:white;
    }
    button {
      padding:14px;
      background:linear-gradient(45deg,#7B2FFF,#00C2FF);
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
      transition:0.3s;
    }
    button:hover { transform:scale(1.05); box-shadow:0 0 15px #00C2FF; }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- PAGE TITLE -->
  <h1>Contact Us</h1>

  <!-- CONTACT FORM -->
  <section>
    <p>Reach out and let’s start your project today!</p>
    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea placeholder="Your Message" required style="min-height:100px;"></textarea>
      <button type="submit">Send Message</button>
    </form>
    <p>Or WhatsApp us directly: <a href="https://wa.me/919004230084" style="color:#00C2FF;">Click here</a></p>
  </section>

</body>
</html>
