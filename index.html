<!DOCTYPE html>
<html>
<head>
  <title>Tendoon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: #0B0B0B;
      color: white;
    }

    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
    }

    h1 {
      font-size: 50px;
      margin: 0;
    }

    p {
      color: #aaa;
      margin-top: 10px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #7B2FFF;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00C2FF;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>Innovate. Connect. Evolve.</h1>
  <p>We Build Brands That Scale Globally</p>
  <a href="#" class="btn">Get Started</a>
</div>
<section style="padding: 60px 20px; text-align:center;">
  <h2>Our Services</h2>
  
  <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:20px; margin-top:30px;">
    
    <div style="background:#111; padding:20px; border-radius:10px; width:250px;">
      <h3>Digital Marketing</h3>
      <p>Social media, ads, SEO and growth strategies.</p>
    </div>

    <div style="background:#111; padding:20px; border-radius:10px; width:250px;">
      <h3>Creative Design</h3>
      <p>Branding, logos, UI/UX and visual identity.</p>
    </div>

    <div style="background:#111; padding:20px; border-radius:10px; width:250px;">
      <h3>Web Development</h3>
      <p>Modern websites and landing pages.</p>
    </div>

  </div>
</section>

</body>
</html>
