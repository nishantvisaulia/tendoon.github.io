<!DOCTYPE html>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #000;

    nav {

      padding: 0 20px;
    }
    .card {
      background: #111;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
      box-shadow: 0 0 10px rgba(123, 47, 255, 0.3);
      transition: 0.3s;
      cursor: pointer;
      text-align: center;

    .card:hover {

      <div class="card">
